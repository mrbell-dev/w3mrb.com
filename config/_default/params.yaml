# w3mrb.com — ham radio + 3D printing bench log
# Trimmed from the HBS default; commented theme options live in the theme docs.

mainSections:
  - blog

description: >-
  Bench notes on amateur radio, QRP and POTA field stations, homebrew RF, and
  3D printing — from an edge-case ham (W3MRB) who's an electronics tinkerer
  first and an operator second.
keywords: ham radio, amateur radio, W3MRB, QRP, POTA, homebrew, RF electronics, 3D printing, SDR

brand: W3MRB
palette: purple
poweredBy: false # Drop the "Build with ❤️ from Hugo and HBS" theme-credit footer.

dateFormat: ":date_long"
titleCase: true
viewer: true # Image viewer (lightbox)
tocWordCount: 1

# Taxonomy widgets
taxonomyPostCount: 20
countTaxonomyPosts: true
pinnedPostCount: 3

sidebar:
  fixed: true

codeBlock:
  lineNos: true

post:
  featuredImage: true # Show the featured image above the content.
  numberifyHeadings: true
  numberifyHeadingsSeparator: .

archive:
  paginate: 20

search:
  paginate: 5
  fuse:
    threshold: 0.1

# Buy Me a Coffee — link-based funding button on posts (theme's `funding` panel).
funding:
  buymeacoffee: mrbell.dev

pwa:
  manifest:
    short_name: W3MRB

# Social icons in the top bar.
topAppBar:
  social:
    github: mrbell-dev
    linkedin: mrbell90
    email: 73@w3mrb.com

# Site-wide social links (footer + author card).
social:
  github: mrbell-dev
  linkedin: mrbell90
  email: 73@w3mrb.com

author:
  name: Michael Bell
  bio: 'Edge-case ham (W3MRB) — electronics and bench science first, operator second. General class, grinding for Amateur Extra. RF as applied physics; 3D printing as the fixture shop.'
  location: North Carolina
  social:
    github: mrbell-dev
    linkedin: mrbell90
    email: 73@w3mrb.com
